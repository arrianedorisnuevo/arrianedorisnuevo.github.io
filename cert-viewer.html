<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Certificate — Arriane Doris Nuevo</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@300;400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  :root {
    --bg:      #080C10;
    --bg2:     #0D1117;
    --surface: #141C26;
    --border:  rgba(0,220,180,0.12);
    --border2: rgba(255,255,255,0.06);
    --cyan:    #00DCB4;
    --cyan-dim: rgba(0,220,180,0.12);
    --cyan-glow: rgba(0,220,180,0.35);
    --text:    #E2EAF4;
    --text-mid:#8899AA;
    --text-dim:#445566;
    --mono:   'JetBrains Mono', monospace;
    --display:'Syne', sans-serif;
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior:smooth; }

  body {
    font-family: var(--display);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  /* grid bg */
  body::before {
    content:''; position:fixed; inset:0;
    background-image:
      linear-gradient(rgba(0,220,180,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,220,180,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events:none; z-index:0;
  }

  /* NAV */
  nav {
    position:fixed; top:0; left:0; right:0; z-index:100;
    display:flex; justify-content:space-between; align-items:center;
    padding:0.9rem 3rem;
    background:rgba(8,12,16,0.9);
    backdrop-filter:blur(20px);
    border-bottom:1px solid var(--border);
  }
  .nav-logo { display:flex; align-items:center; gap:0.75rem; text-decoration:none; }
  .nav-logo-mark {
    width:38px; height:28px; border:1.5px solid var(--cyan);
    display:flex; align-items:center; justify-content:center;
    font-family:var(--mono); font-size:0.52rem; color:var(--cyan);
    position:relative; letter-spacing:0.04em;
  }
  .nav-logo-mark::before { content:''; position:absolute; inset:2px; background:var(--cyan-dim); }
  .nav-logo-text { font-family:var(--mono); font-size:0.72rem; letter-spacing:0.1em; color:var(--text-mid); }
  .nav-logo-text span { color:var(--cyan); }

  .nav-back {
    display:flex; align-items:center; gap:0.5rem;
    font-family:var(--mono); font-size:0.62rem; letter-spacing:0.14em; text-transform:uppercase;
    color:var(--text-dim); text-decoration:none;
    border:1px solid var(--border2); padding:0.35rem 0.8rem; border-radius:2px;
    transition:color 0.25s, border-color 0.25s, background 0.25s;
  }
  .nav-back:hover { color:var(--cyan); border-color:var(--cyan); background:var(--cyan-dim); }
  .nav-back::before { content:'←'; font-size:0.8rem; }

  /* MAIN */
  main {
    position:relative; z-index:1;
    flex:1; display:flex; flex-direction:column;
    padding-top:72px;
  }

  /* NOT FOUND STATE */
  .not-found {
    flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:1rem; padding:4rem 2rem; text-align:center;
  }
  .not-found-code { font-family:var(--mono); font-size:4rem; font-weight:700; color:rgba(0,220,180,0.1); }
  .not-found-msg  { font-family:var(--mono); font-size:0.75rem; letter-spacing:0.15em; text-transform:uppercase; color:var(--text-dim); }

  /* CERT VIEWER — two-column layout */
  .cert-viewer {
    flex:1; display:grid;
    grid-template-columns: 280px 1fr;
    grid-template-rows: auto;
    gap:0;
    max-width:1300px; width:100%; margin:0 auto;
    padding:3rem 3rem 4rem;
  }

  /* LEFT: cert list panel */
  .cert-list-panel {
    padding-right:2rem;
    border-right:1px solid var(--border2);
    display:flex; flex-direction:column; gap:0;
  }
  .clp-header {
    font-family:var(--mono); font-size:0.58rem; letter-spacing:0.2em;
    text-transform:uppercase; color:var(--cyan);
    display:flex; align-items:center; gap:0.6rem;
    padding-bottom:1rem; margin-bottom:0.5rem;
    border-bottom:1px solid var(--border2);
  }
  .clp-header::before { content:'//'; opacity:0.5; }
  .clp-group { margin-bottom:1.4rem; }
  .clp-group-label {
    font-family:var(--mono); font-size:0.5rem; letter-spacing:0.18em;
    text-transform:uppercase; color:var(--text-dim);
    padding:0.5rem 0 0.4rem; margin-bottom:0.2rem;
    border-bottom:1px solid rgba(255,255,255,0.04);
  }
  .clp-item {
    display:flex; flex-direction:column; gap:0.15rem;
    padding:0.55rem 0.6rem;
    text-decoration:none;
    border-left:2px solid transparent;
    transition:border-color 0.2s, background 0.2s;
    border-radius:0 2px 2px 0;
    cursor:pointer;
  }
  .clp-item:hover { border-left-color:rgba(0,220,180,0.4); background:rgba(0,220,180,0.04); }
  .clp-item.active { border-left-color:var(--cyan); background:rgba(0,220,180,0.07); }
  .clp-item-name {
    font-family:var(--display); font-size:0.78rem; font-weight:600;
    color:var(--text-mid); line-height:1.3;
    transition:color 0.2s;
  }
  .clp-item:hover .clp-item-name,
  .clp-item.active .clp-item-name { color:var(--text); }
  .clp-item.active .clp-item-name { color:var(--cyan); }
  .clp-item-date {
    font-family:var(--mono); font-size:0.52rem; letter-spacing:0.08em;
    color:var(--text-dim);
  }
  .clp-item-ext {
    font-family:var(--mono); font-size:0.5rem; letter-spacing:0.08em;
    color:rgba(0,220,180,0.5); margin-top:0.1rem;
  }

  /* RIGHT: cert detail */
  .cert-detail {
    padding-left:2.5rem;
    display:flex; flex-direction:column;
    grid-column:2;
  }

  /* Breadcrumb */
  .breadcrumb {
    font-family:var(--mono); font-size:0.58rem; letter-spacing:0.15em; text-transform:uppercase;
    color:var(--text-dim); margin-bottom:1.5rem; display:flex; align-items:center; gap:0.5rem;
    flex-wrap:wrap;
  }
  .breadcrumb a { color:var(--text-dim); text-decoration:none; transition:color 0.2s; }
  .breadcrumb a:hover { color:var(--cyan); }
  .breadcrumb span { color:var(--cyan); }

  /* Header */
  .cert-header { margin-bottom:1.8rem; }
  .cert-org-label {
    font-family:var(--mono); font-size:0.62rem; letter-spacing:0.2em; text-transform:uppercase;
    color:var(--cyan); display:flex; align-items:center; gap:0.8rem; margin-bottom:0.5rem;
  }
  .cert-org-label::after { content:''; width:40px; height:1px; background:var(--cyan); opacity:0.4; }
  .cert-title {
    font-family:var(--display); font-size:clamp(1.3rem,2.5vw,2rem);
    font-weight:700; color:#fff; letter-spacing:-0.02em; margin-bottom:0.5rem; line-height:1.2;
  }
  .cert-meta {
    display:flex; align-items:center; gap:1.2rem; flex-wrap:wrap;
    font-family:var(--mono); font-size:0.6rem; letter-spacing:0.1em;
    text-transform:uppercase; color:var(--text-dim);
  }
  .cert-meta-item { display:flex; align-items:center; gap:0.4rem; }
  .cert-meta-dot { width:4px; height:4px; background:var(--cyan); border-radius:50%; flex-shrink:0; }

  /* PDF canvas area */
  .cert-embed-wrap {
    background:var(--surface);
    border:1px solid var(--border); position:relative;
    overflow:hidden; min-height:420px;
    display:flex; align-items:center; justify-content:center;
  }
  .cert-embed-wrap::before {
    content:''; position:absolute; top:0; left:0; right:0;
    height:2px; background:linear-gradient(90deg,transparent,var(--cyan),transparent);
    opacity:0.6; z-index:2; pointer-events:none;
  }
  .cert-embed-wrap::after {
    content:''; position:absolute; bottom:0; right:0;
    width:20px; height:20px;
    border-right:1px solid var(--cyan); border-bottom:1px solid var(--cyan);
    opacity:0.4; z-index:2; pointer-events:none;
  }
  .corner-tl {
    position:absolute; top:0; left:0; width:20px; height:20px;
    border-left:1px solid var(--cyan); border-top:1px solid var(--cyan);
    opacity:0.4; z-index:2; pointer-events:none;
  }
  #cert-canvas {
    display:block; max-width:100%; max-height:72vh;
    box-shadow:0 4px 40px rgba(0,0,0,0.5);
  }
  .cv-loading {
    display:flex; flex-direction:column; align-items:center; gap:1rem;
    font-family:'JetBrains Mono',monospace; font-size:0.62rem;
    letter-spacing:0.15em; text-transform:uppercase; color:rgba(0,220,180,0.6);
    min-height:200px; justify-content:center;
  }
  .cv-spinner {
    width:36px; height:36px; border:2px solid rgba(0,220,180,0.12);
    border-top-color:#00DCB4; border-radius:50%;
    animation:spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform:rotate(360deg); } }

  /* Action bar */
  .cert-actions {
    display:flex; align-items:center; gap:0.75rem; margin-top:1.2rem; flex-wrap:wrap;
  }
  .cert-action-btn {
    display:inline-flex; align-items:center; gap:0.5rem;
    font-family:var(--mono); font-size:0.62rem; letter-spacing:0.12em; text-transform:uppercase;
    padding:0.55rem 1.1rem; border-radius:2px; text-decoration:none; cursor:pointer;
    transition:all 0.25s; border:1px solid; background:transparent;
  }
  .cert-action-secondary { color:var(--cyan); border-color:var(--cyan); }
  .cert-action-secondary:hover { background:var(--cyan-dim); }
  .cert-action-ghost { color:var(--text-dim); border-color:var(--border2); }
  .cert-action-ghost:hover { color:var(--cyan); border-color:var(--cyan); }

  /* NOT FOUND */
  .not-found {
    flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:1rem; padding:4rem 2rem; text-align:center;
  }
  .not-found-code { font-family:var(--mono); font-size:4rem; font-weight:700; color:rgba(0,220,180,0.1); }
  .not-found-msg  { font-family:var(--mono); font-size:0.75rem; letter-spacing:0.15em; text-transform:uppercase; color:var(--text-dim); }

  /* Footer */
  footer {
    position:relative; z-index:1;
    border-top:1px solid var(--border); padding:1.5rem 3rem;
    display:flex; justify-content:space-between; align-items:center;
    background:var(--bg);
  }
  .footer-brand { font-family:var(--mono); font-size:0.6rem; letter-spacing:0.12em; color:var(--text-dim); }
  .footer-brand span { color:var(--cyan); }
  .footer-copy { font-family:var(--mono); font-size:0.58rem; color:var(--text-dim); }

  /* MOBILE: stack layout */
  @media (max-width:900px) {
    nav { padding:0.9rem 1.2rem; }
    .cert-viewer { grid-template-columns:1fr; padding:1.5rem 1.2rem 3rem; gap:2rem; }
    .cert-list-panel { padding-right:0; border-right:none; border-bottom:1px solid var(--border2); padding-bottom:1.5rem; }
    .cert-detail { padding-left:0; }
    footer { padding:1.5rem 1.2rem; flex-direction:column; gap:0.5rem; }
    .cert-embed-wrap { min-height:280px; }
  }
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <a class="nav-logo" href="index.html">
    <div class="nav-logo-mark">ADLN</div>
    <div class="nav-logo-text"><span>arriane</span>.dev</div>
  </a>
  <a class="nav-back" href="index.html">Back to Portfolio</a>
</nav>

<main id="main">
  <!-- Content injected by JS -->
</main>

<footer>
  <div class="footer-brand"><span>arriane</span>.dev // ADLN</div>
  <div class="footer-copy">&copy; 2026 Arriane Doris Nuevo</div>
</footer>

<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  // ─── Certificate Registry (grouped for sidebar) ───────────────────────────
  const CERT_GROUPS = [
    {
      org: 'Canva Design School',
      certs: [
        { id:'canva-graphic-design-essentials', title:'Graphic Design Essentials', date:'Mar 9, 2025', extUrl:'https://www.canva.com/en/design-school/certification-award/783198ed-efac-4deb-9458-8443343165fe' },
      ]
    },
    {
      org: 'freeCodeCamp.org',
      certs: [
        { id:'fcc-responsive-web-design', title:'Responsive Web Design', date:'Jun 4, 2025', extUrl:'https://www.freecodecamp.org/certification/arrianedoris/responsive-web-design' },
      ]
    },
    {
      org: 'Google Applied Digital Skills',
      certs: [
        { id:'google-ads-program-progress-bar',   title:'Program a Progress Bar',                      date:'Mar 8, 2025'  },
        { id:'google-ads-research-develop-topic', title:'Research and Develop a Topic',                date:'Mar 2, 2025'  },
        { id:'google-ads-prepare-business-plan',  title:'Prepare Your Business Plan',                  date:'Mar 2, 2025'  },
        { id:'google-ads-estimate-financing',     title:'Estimate Financing for Your Business Plan',   date:'Feb 28, 2025' },
        { id:'google-ads-build-online-business',  title:'Build Your Online Business',                  date:'Feb 28, 2025' },
        { id:'google-ads-discover-ai-daily-life', title:'Discover AI in Daily Life',                   date:'Feb 27, 2025' },
      ]
    },
    {
      org: 'DICT RO IX',
      certs: [
        { id:'dict-image-editing-open-source', title:'Image Editing Using Open-Source Software', date:'May 7–9, 2019' },
      ]
    },
    {
      org: 'TESDA',
      certs: [
        { id:'tesda-english-proficiency', title:'English Proficiency', date:'Dec 8–22, 2014' },
      ]
    },
  ];

  // Flatten for quick lookup
  const CERTS_BY_ID = {};
  CERT_GROUPS.forEach(g => g.certs.forEach(c => CERTS_BY_ID[c.id] = { ...c, org: g.org, pdf: c.id + '.pdf' }));

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ─── Build sidebar HTML ───────────────────────────────────────────────────
  function buildSidebar(activeId) {
    let html = `<div class="cert-list-panel">
      <div class="clp-header">All Certifications</div>`;
    CERT_GROUPS.forEach(g => {
      html += `<div class="clp-group">
        <div class="clp-group-label">${escHtml(g.org)}</div>`;
      g.certs.forEach(c => {
        const isActive = c.id === activeId;
        html += `<a class="clp-item${isActive ? ' active' : ''}" href="cert-viewer.html?id=${c.id}">
          <span class="clp-item-name">${escHtml(c.title)}</span>
          <span class="clp-item-date">${escHtml(c.date)}</span>
          ${c.extUrl ? '<span class="clp-item-ext">&#x2197; has external link</span>' : ''}
        </a>`;
      });
      html += `</div>`;
    });
    html += `</div>`;
    return html;
  }

  // ─── Render PDF to canvas ─────────────────────────────────────────────────
  async function renderCert(pdfUrl) {
    const canvas  = document.getElementById('cert-canvas');
    const loading = document.getElementById('cvLoading');
    try {
      const pdf      = await pdfjsLib.getDocument(pdfUrl).promise;
      const page     = await pdf.getPage(1);
      const vp0      = page.getViewport({ scale: 1 });
      const dpr      = Math.min(window.devicePixelRatio || 1, 2);
      const maxW     = (window.innerWidth  * 0.6) * dpr;
      const maxH     = (window.innerHeight * 0.72) * dpr;
      const scale    = Math.min(maxW / vp0.width, maxH / vp0.height);
      const viewport = page.getViewport({ scale });
      canvas.width   = viewport.width;
      canvas.height  = viewport.height;
      const dispW    = viewport.width / dpr;
      canvas.style.width  = Math.min(dispW, window.innerWidth * 0.6) + 'px';
      canvas.style.height = 'auto';
      await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
      loading.style.display = 'none';
      canvas.style.display  = 'block';
    } catch(e) {
      loading.innerHTML = `<span style="color:rgba(0,220,180,0.5);font-family:var(--mono);font-size:0.6rem;letter-spacing:0.1em;text-align:center;">Could not render PDF.<br>Try opening directly.</span>`;
    }
  }

  // ─── Copy link ────────────────────────────────────────────────────────────
  function copyLink() {
    navigator.clipboard.writeText(window.location.href).then(() => {
      const btn = document.querySelector('[onclick="copyLink()"]');
      const orig = btn.innerHTML;
      btn.innerHTML = '✓ Copied!';
      btn.style.color = 'var(--cyan)'; btn.style.borderColor = 'var(--cyan)';
      setTimeout(() => { btn.innerHTML = orig; btn.style.color=''; btn.style.borderColor=''; }, 2000);
    });
  }

  // ─── Main render ─────────────────────────────────────────────────────────
  (async function() {
    const params = new URLSearchParams(window.location.search);
    const id     = params.get('id');
    const main   = document.getElementById('main');
    const cert   = id ? CERTS_BY_ID[id] : null;

    if (cert) document.title = cert.title + ' — Arriane Doris Nuevo';

    if (!cert) {
      main.innerHTML = `
        <div style="flex:1;display:flex;flex-direction:column;">
          <div style="display:grid;grid-template-columns:280px 1fr;max-width:1300px;width:100%;margin:0 auto;padding:3rem;gap:0;flex:1;">
            ${buildSidebar(null)}
            <div class="cert-detail" style="padding-left:2.5rem;display:flex;align-items:center;justify-content:center;">
              <div class="not-found">
                <div class="not-found-code">—</div>
                <div class="not-found-msg" style="margin-bottom:0.5rem;">Select a certificate from the list</div>
              </div>
            </div>
          </div>
        </div>`;
      return;
    }

    const extUrl = cert.extUrl || null;

    main.innerHTML = `
      <div class="cert-viewer">
        ${buildSidebar(id)}
        <div class="cert-detail">
          <div class="breadcrumb">
            <a href="index.html">Portfolio</a>
            <span>//</span>
            <a href="index.html#certifications">Certifications</a>
            <span>//</span>
            <span style="color:var(--text-mid)">${escHtml(cert.title)}</span>
          </div>
          <div class="cert-header">
            <div class="cert-org-label">${escHtml(cert.org)}</div>
            <div class="cert-title">${escHtml(cert.title)}</div>
            <div class="cert-meta">
              <div class="cert-meta-item"><div class="cert-meta-dot"></div><span>${escHtml(cert.date)}</span></div>
              <div class="cert-meta-item"><div class="cert-meta-dot"></div><span>ID // ${escHtml(id)}</span></div>
            </div>
          </div>
          <div class="cert-embed-wrap" id="embedWrap">
            <div class="corner-tl"></div>
            <div class="cv-loading" id="cvLoading">
              <div class="cv-spinner"></div>
              <span>Rendering certificate...</span>
            </div>
            <canvas id="cert-canvas" style="display:none;"></canvas>
          </div>
          <div class="cert-actions">
            ${extUrl
              ? `<a class="cert-action-btn cert-action-secondary" href="${extUrl}" target="_blank" rel="noopener">&#x2197; View on ${escHtml(cert.org.split(' ')[0])}</a>`
              : `<a class="cert-action-btn cert-action-secondary" href="${cert.pdf}" target="_blank" rel="noopener">&#x2197; Open PDF</a>`
            }
            <button class="cert-action-btn cert-action-ghost" onclick="copyLink()">&#x29C9; Copy Link</button>
            <a class="cert-action-btn cert-action-ghost" href="index.html#certifications">← Portfolio</a>
          </div>
        </div>
      </div>`;

    await renderCert(cert.pdf);
  })();
</script>

</body>
</html>
